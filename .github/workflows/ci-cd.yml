name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
      - name: Start the app
        run: npm run dev &  # Запуск сервера в бекграунді

      - name: Wait for the app to start
        run: sleep 10  # Чекаємо кілька секунд, щоб сервер запустився

      - name: Run ESLint
        run: npm run lint

      - name: Install Playwright browsers
        run: npx playwright install  # Завантажує браузери для Playwright

      - name: Run e2e tests
        run: npm run test:e2e  # Запуск енд-ту-енд тестів

      - name: Build project
        run: npm run build